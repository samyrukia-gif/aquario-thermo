<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aquario Monitor Sam</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#07101d">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#07101d;
color:white;
text-align:center;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#101b2d;
border-radius:20px;
padding:20px;
margin-top:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.temp{
font-size:80px;
color:#6fe6ff;
font-weight:bold;
}

button{
background:#1d88ff;
border:none;
padding:12px 20px;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>🐟 Aquario Monitor Sam</h1>

<button id="installBtn" style="display:none">📲 Instalar App</button>

<div class="card">

<h3>🌡️ Temperatura atual</h3>

<div class="temp" id="temp">--</div>

<div id="status">Carregando...</div>

</div>

<div class="card">

<h3>📊 Histórico</h3>

<canvas id="chart"></canvas>

</div>

</div>

<audio id="alertSound">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script>

const API="https://aquario-thermo.onrender.com"

const TEMP_MIN=22
const TEMP_MAX=28
const META=27

let installPrompt

window.addEventListener("beforeinstallprompt", e=>{
e.preventDefault()
installPrompt=e
document.getElementById("installBtn").style.display="block"
})

document.getElementById("installBtn").onclick=async ()=>{
installPrompt.prompt()
}

const ctx=document.getElementById("chart").getContext("2d")

const chart=new Chart(ctx,{
type:"line",
data:{
labels:[],
datasets:[
{
label:"Temperatura",
data:[],
borderColor:"#6fe6ff",
backgroundColor:"rgba(111,230,255,0.2)",
fill:true,
tension:0.4
},
{
label:"Meta",
data:[],
borderColor:"#6bff84",
borderDash:[5,5]
},
{
label:"Crítico",
data:[],
borderColor:"#ffb366",
borderDash:[5,5]
}
]
},
options:{
plugins:{
legend:{display:false}
}
}
})

async function atualizar(){

try{

const r=await fetch(API+"/api/status")
const d=await r.json()

const temp=Number(d.temperature)

document.getElementById("temp").innerText=temp.toFixed(1)+"°C"

if(temp<TEMP_MIN){

document.getElementById("status").innerText="⚠️ Água muito fria"

tocarAlarme()

}
else if(temp>TEMP_MAX){

document.getElementById("status").innerText="🔥 Superaquecimento"

tocarAlarme()

}
else{

document.getElementById("status").innerText="✅ Temperatura normal"

}

}catch(e){

document.getElementById("status").innerText="offline"

}

}

async function atualizarGrafico(){

try{

const r=await fetch(API+"/api/history")
const data=await r.json()

const labels=data.map(i=>i.time)
const temps=data.map(i=>i.temperature)

chart.data.labels=labels
chart.data.datasets[0].data=temps
chart.data.datasets[1].data=labels.map(()=>META)
chart.data.datasets[2].data=labels.map(()=>TEMP_MIN)

chart.update()

}catch(e){}

}

function tocarAlarme(){

const som=document.getElementById("alertSound")

som.play()

}

async function atualizarTudo(){

await atualizar()
await atualizarGrafico()

}

atualizarTudo()

setInterval(atualizarTudo,3000)

</script>

</body>
</html>
