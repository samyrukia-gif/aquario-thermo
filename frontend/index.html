<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Aquário</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#0f172a;
      color:white;
      margin:0;
      padding:40px 20px;
      text-align:center;
    }

    .container{
      max-width:950px;
      margin:0 auto;
    }

    .card{
      background:#1e293b;
      padding:30px;
      border-radius:16px;
      margin-bottom:24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    .temp{
      font-size:72px;
      margin:20px 0 10px;
    }

    .status{
      font-size:22px;
      opacity:0.95;
      margin-bottom:8px;
    }

    .subtitle{
      opacity:0.8;
      margin-top:8px;
    }

    .legend-box{
      display:flex;
      justify-content:center;
      gap:18px;
      flex-wrap:wrap;
      margin-top:14px;
      font-size:14px;
      opacity:0.9;
    }

    .legend-item{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .dot{
      width:14px;
      height:14px;
      border-radius:50%;
      display:inline-block;
    }

    canvas{
      background:white;
      border-radius:12px;
      padding:12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🌡 Temperatura do Aquário</h1>
      <div class="temp" id="temp">--</div>
      <div class="status" id="heater">Carregando...</div>
      <div class="subtitle" id="updatedAt">Atualizando...</div>

      <div class="legend-box">
        <div class="legend-item"><span class="dot" style="background:#2563eb;"></span> Temperatura real</div>
        <div class="legend-item"><span class="dot" style="background:#22c55e;"></span> Meta 27 °C</div>
        <div class="legend-item"><span class="dot" style="background:#f59e0b;"></span> Crítico baixo 22 °C</div>
        <div class="legend-item"><span class="dot" style="background:#ef4444;"></span> Superaquecimento 28 °C</div>
      </div>
    </div>

    <div class="card">
      <h2>📈 Histórico de Temperatura</h2>
      <canvas id="graficoTemperatura"></canvas>
    </div>
  </div>

  <script>
    const API_BASE = "https://aquario-thermo.onrender.com";

    const TEMPERATURA_ALVO = 27;
    const ALERTA_BAIXO = 22;
    const ALERTA_ALTO = 28;

    const ctx = document.getElementById("graficoTemperatura").getContext("2d");

    const grafico = new Chart(ctx, {
      type: "line",
      data: {
        labels: [],
        datasets: [
          {
            label: "Temperatura °C",
            data: [],
            borderColor: "#2563eb",
            backgroundColor: "rgba(37, 99, 235, 0.15)",
            borderWidth: 3,
            tension: 0.3,
            fill: true
          },
          {
            label: "Meta 27 °C",
            data: [],
            borderColor: "#22c55e",
            borderWidth: 2,
            borderDash: [8, 6],
            pointRadius: 0,
            tension: 0,
            fill: false
          },
          {
            label: "Crítico baixo 22 °C",
            data: [],
            borderColor: "#f59e0b",
            borderWidth: 2,
            borderDash: [8, 6],
            pointRadius: 0,
            tension: 0,
            fill: false
          },
          {
            label: "Superaquecimento 28 °C",
            data: [],
            borderColor: "#ef4444",
            borderWidth: 2,
            borderDash: [8, 6],
            pointRadius: 0,
            tension: 0,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        plugins: {
          legend: {
            labels: {
              color: "#111827"
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: "#111827"
            }
          },
          y: {
            beginAtZero: false,
            ticks: {
              color: "#111827"
            }
          }
        }
      }
    });

    async function atualizarStatus() {
      const resposta = await fetch(`${API_BASE}/api/status`);
      const dados = await resposta.json();

      document.getElementById("temp").innerText = dados.temperature + " °C";
      document.getElementById("heater").innerText =
        dados.heaterOn ? "🔥 Aquecedor ligado" : "❄ Aquecedor desligado";
      document.getElementById("updatedAt").innerText =
        "Última atualização: " + new Date().toLocaleTimeString("pt-BR");
    }

    async function atualizarGrafico() {
      const resposta = await fetch(`${API_BASE}/api/history`);
      const historico = await resposta.json();

      const labels = historico.map(item => item.time);
      const temperaturas = historico.map(item => item.temperature);

      grafico.data.labels = labels;
      grafico.data.datasets[0].data = temperaturas;
      grafico.data.datasets[1].data = labels.map(() => TEMPERATURA_ALVO);
      grafico.data.datasets[2].data = labels.map(() => ALERTA_BAIXO);
      grafico.data.datasets[3].data = labels.map(() => ALERTA_ALTO);

      grafico.update();
    }

    async function atualizarTudo() {
      await atualizarStatus();
      await atualizarGrafico();
    }

    atualizarTudo();
    setInterval(atualizarTudo, 3000);
  </script>
</body>
</html>
